###############################################################################################################
###################################+-----------------------------+###############################################
###################################|      ~  IMAGES   ~          |###############################################
###################################+-----------------------------+###############################################
###############################################################################################################

services:

# +--------------------+
# |       MYSQL        |
# +--------------------+
  mysql:
    image: mysql:8.3
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db_setup/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    restart: unless-stopped
    networks:
      - pipeline_net
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

# +--------------------+
# |   ELASTICSEARCH    |
# +--------------------+
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data
    restart: unless-stopped
    networks:
      - pipeline_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

# +--------------------+
# |      KIBANA        |
# +--------------------+
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pipeline_net

# +--------------------+
# |       KAFKA        |
# +--------------------+
  kafka:
    image: confluentinc/cp-kafka:7.8.3
    ports:
      - "9092:9092"    # internal docker listener — services inside docker use this
      - "29092:29092"  # external listener — simulator running locally uses this
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,EXTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    restart: unless-stopped
    networks:
      - pipeline_net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

# +--------------------+
# |     KAFKA UI       |
# +--------------------+
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pipeline_net

###############################################################################################################
###################################+-----------------------------+###############################################
###################################|      ~   CODE    ~          |###############################################
###################################+-----------------------------+###############################################
###############################################################################################################

# +------------------------+
# | simulation             |
# +------------------------+
  simulation:
    build:
      context: .
      dockerfile: 0.simulation/Dockerfile
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pipeline_net

# +------------------------+
# | intel_service          |
# +------------------------+
  intel_service:
    build:
      context: .
      dockerfile: 1.intel_service/Dockerfile
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_INTEL_TOPIC: intel
      KAFKA_DLQ_TOPIC: intel_signals_dlq
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      ES_HOST: http://elasticsearch:9200
      LOG_INDEX: intel-logs
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pipeline_net

# +------------------------+
# | attack_service         |
# +------------------------+
  attack_service:
    build:
      context: .
      dockerfile: 2.attack_service/Dockerfile
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_ATTACK_TOPIC: attack
      KAFKA_DLQ_TOPIC: intel_signals_dlq
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      ES_HOST: http://elasticsearch:9200
      LOG_INDEX: intel-logs
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pipeline_net

# +------------------------+
# | damage_service         |
# +------------------------+
  damage_service:
    build:
      context: .
      dockerfile: 3.dammage_service/Dockerfile
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_DAMAGE_TOPIC: damage
      KAFKA_DLQ_TOPIC: intel_signals_dlq
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      ES_HOST: http://elasticsearch:9200
      LOG_INDEX: intel-logs
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pipeline_net

volumes:
  mysql_data:
  es_data:

networks:
  pipeline_net:
    driver: bridge
